services:
  php-fpm:
    build:
      context: ./
      dockerfile: ./api.Dockerfile
    container_name: bibliotroca-api
    volumes:
      - .:/var/www/html/
    environment:
      PHP_UPLOAD_MAX_FILESIZE: 2G
      PHP_POST_MAX_SIZE: 2G
    networks:
      - app-network

  nginx:
    image: nginx:latest
    container_name: bibliotroca-nginx
    ports:
      - "8888:80"
    volumes:
      - ./nginx-config:/etc/nginx/conf.d  # diretorio de configuracoes
      - .:/var/www/html/
    networks:
      - app-network
    depends_on:
      - php-fpm

  mysql:
    image: mysql
    container_name: bibliotroca-mysql
    environment:
      MYSQL_ROOT_PASSWORD: 12345
      MYSQL_DATABASE: bibliotroca_bd
    volumes:
      - ./db/mysql:/var/lib/mysql
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin
    restart: always
    ports:
      - 8878:80
    environment:
      - PMA_ARBITRARY=1
      - UPLOAD_LIMIT=30M
    networks:
        - app-network
  
networks:
  app-network:
    driver: bridge